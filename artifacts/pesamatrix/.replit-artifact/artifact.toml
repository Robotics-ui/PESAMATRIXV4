kind = "web"
previewPath = "/"
title = "PESAMATRIX V2"
version = "1.0.0"
id = "artifacts/pesamatrix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25376

[services.development]
run = "pnpm --filter @workspace/pesamatrix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pesamatrix", "run", "build" ]
publicDir = "artifacts/pesamatrix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25376"
BASE_PATH = "/"
